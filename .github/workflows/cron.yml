name: Grafana Fetch Cron

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ IMPORTANT FIX

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install

      - name: Run script
        run: node index.js
