name: Run Script Every 30s

on:
  schedule:
    - cron: "*/1 * * * *"   # (GitHub min = 1 min)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install deps
        run: npm install
      - name: Run script
        run: node index.js
